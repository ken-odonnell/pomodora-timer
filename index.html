<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Pomodoro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind to use class-based dark mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        /* Smooth, linear transition for the radial wipe */
        #progress-circle {
            transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
        }
        
        /* Hide number input arrows for a cleaner look */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen m-0 font-sans antialiased text-gray-800 bg-white dark:bg-[#191919] dark:text-gray-100 transition-colors duration-300 relative">

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 transition-colors focus:outline-none">
        <!-- Moon Icon (for Dark Mode trigger) -->
        <svg id="icon-moon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
        </svg>
        <!-- Sun Icon (for Light Mode trigger) -->
        <svg id="icon-sun" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 2.32a1 1 0 011.415 0l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-2.32 4.22a1 1 0 010 1.415l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-2.32a1 1 0 01-1.415 0l-.707-.707a1 1 0 011.414-1.414l.707.707a1 1 0 010 1.414zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm2.32-4.22a1 1 0 010-1.415l.707-.707a1 1 0 011.414 1.414l-.707.707a1 1 0 01-1.414 0zM10 6a4 4 0 100 8 4 4 0 000-8z" clip-rule="evenodd"></path>
        </svg>
    </button>

    <div class="flex flex-col items-center justify-center w-full max-w-sm p-4">

        <!-- Radial Timer & Inner Content -->
        <div class="relative flex items-center justify-center w-56 h-56 sm:w-64 sm:h-64 mb-3">
            
            <!-- SVG Ring -->
            <svg class="absolute inset-0 w-full h-full" style="transform: rotate(-90deg) scaleX(-1);" viewBox="0 0 200 200">
                <!-- Background track -->
                <circle cx="100" cy="100" r="92" stroke="currentColor" stroke-width="4" fill="none" class="text-gray-200 dark:text-gray-700/50" />
                <!-- Progress wipe -->
                <circle id="progress-circle" cx="100" cy="100" r="92" stroke="currentColor" stroke-width="5" fill="none" stroke-linecap="round" class="text-gray-900 dark:text-gray-100" />
            </svg>
            
            <!-- Inner Content -->
            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none pt-2">
                <!-- Status Indicator -->
                <div id="mode-display" class="text-xs font-bold tracking-widest uppercase mb-1 text-gray-500 dark:text-gray-400 transition-colors pointer-events-auto">
                    Focus
                </div>

                <!-- Time Display -->
                <div id="time-display" class="text-4xl sm:text-5xl font-light tabular-nums text-gray-900 dark:text-gray-100 mb-3 pointer-events-auto">
                    90:00
                </div>

                <!-- Controls -->
                <div class="flex items-center justify-center gap-3 pointer-events-auto">
                    <button id="play-pause-btn" class="flex items-center justify-center w-10 h-10 bg-gray-900 hover:bg-gray-700 dark:bg-gray-100 dark:hover:bg-white text-white dark:text-gray-900 rounded-full shadow-lg transition-transform active:scale-95 focus:outline-none">
                        <!-- Play Icon (Default) -->
                        <svg id="icon-play" class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <!-- Pause Icon (Hidden initially) -->
                        <svg id="icon-pause" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                        </svg>
                    </button>

                    <button id="stop-btn" class="flex items-center justify-center w-8 h-8 bg-gray-200 hover:bg-gray-300 dark:bg-[#2A2A2A] dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 rounded-full shadow transition-transform active:scale-95 focus:outline-none">
                        <!-- Stop Icon -->
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 6h12v12H6z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Settings (Shrunken & Compact) -->
        <div class="flex items-center justify-center gap-4 w-full opacity-60 hover:opacity-100 transition-opacity">
            <div class="flex items-center gap-1.5">
                <label for="work-input" class="text-[10px] uppercase tracking-wider text-gray-500 dark:text-gray-400 font-semibold">Work</label>
                <input id="work-input" type="number" value="90" min="1" max="999" class="w-8 text-center bg-transparent border-b border-gray-300 dark:border-gray-600 focus:border-gray-900 dark:focus:border-gray-100 outline-none text-sm font-semibold transition-colors">
            </div>
            
            <div class="w-1 h-1 rounded-full bg-gray-300 dark:bg-gray-600"></div>

            <div class="flex items-center gap-1.5">
                <label for="break-input" class="text-[10px] uppercase tracking-wider text-gray-500 dark:text-gray-400 font-semibold">Break</label>
                <input id="break-input" type="number" value="10" min="1" max="999" class="w-8 text-center bg-transparent border-b border-gray-300 dark:border-gray-600 focus:border-gray-500 dark:focus:border-gray-400 outline-none text-sm font-semibold transition-colors">
            </div>
        </div>

    </div>

    <script>
        // Theme Toggle Logic
        const htmlElement = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const iconMoon = document.getElementById('icon-moon');
        const iconSun = document.getElementById('icon-sun');

        // Set Default Theme (Prefer dark since Notion is usually dark)
        if (!localStorage.getItem('theme')) {
            localStorage.setItem('theme', 'dark');
        }

        if (localStorage.getItem('theme') === 'dark') {
            htmlElement.classList.add('dark');
            iconSun.classList.remove('hidden');
        } else {
            htmlElement.classList.remove('dark');
            iconMoon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
                iconMoon.classList.add('hidden');
                iconSun.classList.remove('hidden');
            } else {
                localStorage.setItem('theme', 'light');
                iconSun.classList.add('hidden');
                iconMoon.classList.remove('hidden');
            }
        });

        // DOM Elements
        const timeDisplay = document.getElementById('time-display');
        const modeDisplay = document.getElementById('mode-display');
        const progressCircle = document.getElementById('progress-circle');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const workInput = document.getElementById('work-input');
        const breakInput = document.getElementById('break-input');

        // SVG Circle Setup
        const radius = 92;
        const circumference = 2 * Math.PI * radius;
        progressCircle.style.strokeDasharray = circumference;
        progressCircle.style.strokeDashoffset = 0;

        // State Variables
        let workDuration = 90 * 60; // 90 minutes in seconds
        let breakDuration = 10 * 60; // 10 minutes in seconds
        let timeLeft = workDuration;
        let isRunning = false;
        let isWorkMode = true;
        let timerInterval = null;

        // Formats time from seconds to MM:SS
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Updates the text and the radial wipe progress
        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeLeft);
            
            const totalDuration = isWorkMode ? workDuration : breakDuration;
            
            // Calculate progress offset
            const progress = (timeLeft / totalDuration);
            const offset = circumference - (progress * circumference);
            
            progressCircle.style.strokeDashoffset = offset;
        }

        // Updates the text to say Focus/Working/Break depending on state
        function updateModeText() {
            if (isWorkMode) {
                modeDisplay.textContent = isRunning ? "Working" : "Focus";
                modeDisplay.className = "text-xs font-bold tracking-widest uppercase mb-1 text-gray-900 dark:text-gray-100 transition-colors pointer-events-auto";
                progressCircle.className.baseVal = "text-gray-900 dark:text-gray-100";
                playPauseBtn.className = "flex items-center justify-center w-10 h-10 bg-gray-900 hover:bg-gray-700 dark:bg-gray-100 dark:hover:bg-white text-white dark:text-gray-900 rounded-full shadow-lg transition-transform active:scale-95 focus:outline-none";
            } else {
                modeDisplay.textContent = isRunning ? "Resting" : "Break";
                modeDisplay.className = "text-xs font-bold tracking-widest uppercase mb-1 text-gray-500 dark:text-gray-400 transition-colors pointer-events-auto";
                progressCircle.className.baseVal = "text-gray-500 dark:text-gray-400";
                playPauseBtn.className = "flex items-center justify-center w-10 h-10 bg-gray-500 hover:bg-gray-600 dark:bg-gray-400 dark:hover:bg-gray-300 text-white dark:text-gray-900 rounded-full shadow-lg transition-transform active:scale-95 focus:outline-none";
            }
            
            // Revert back to softer gray if completely stopped/idle in focus mode
            if (isWorkMode && !isRunning && timeLeft === workDuration) {
                 modeDisplay.className = "text-xs font-bold tracking-widest uppercase mb-1 text-gray-500 dark:text-gray-400 transition-colors pointer-events-auto";
            }
        }

        // Switches between Work and Break modes
        function switchMode() {
            isWorkMode = !isWorkMode;
            timeLeft = isWorkMode ? workDuration : breakDuration;
            updateModeText();
            updateDisplay();
        }

        // Timer Tick logic
        function tick() {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                switchMode();
            }
        }

        // Play / Pause Logic
        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                iconPause.classList.add('hidden');
                iconPlay.classList.remove('hidden');
            } else {
                timerInterval = setInterval(tick, 1000);
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
            }
            isRunning = !isRunning;
            updateModeText();
        }

        // Stop Logic
        function stopTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            iconPause.classList.add('hidden');
            iconPlay.classList.remove('hidden');
            
            // Reset to current mode's full time
            timeLeft = isWorkMode ? workDuration : breakDuration;
            
            updateModeText();
            
            // Remove CSS transition temporarily to prevent wiping backward animation on reset
            progressCircle.style.transition = 'none';
            updateDisplay();
            // Restore transition after a tiny delay
            setTimeout(() => {
                progressCircle.style.transition = 'stroke-dashoffset 1s linear, stroke 0.5s ease';
            }, 50);
        }

        // Apply custom durations when inputs change
        function updateDurations() {
            const newWork = parseInt(workInput.value);
            const newBreak = parseInt(breakInput.value);

            if (!isNaN(newWork) && newWork > 0) workDuration = newWork * 60;
            if (!isNaN(newBreak) && newBreak > 0) breakDuration = newBreak * 60;

            // If stopped, instantly reflect the new time based on mode
            if (!isRunning) {
                timeLeft = isWorkMode ? workDuration : breakDuration;
                updateDisplay();
            }
        }

        // Event Listeners
        playPauseBtn.addEventListener('click', toggleTimer);
        stopBtn.addEventListener('click', stopTimer);
        workInput.addEventListener('change', updateDurations);
        breakInput.addEventListener('change', updateDurations);

        // Initialize display
        updateModeText();
        updateDisplay();

    </script>
</body>
</html>
