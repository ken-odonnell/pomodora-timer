<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Pomodoro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth, linear transition for the radial wipe */
        #progress-circle {
            transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
        }
        
        /* Hide number input arrows for a cleaner look */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* Ensure smooth rendering in iframes */
        body {
            background-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen m-0 font-sans antialiased text-gray-800 dark:text-gray-100 bg-white dark:bg-gray-900 transition-colors duration-300">

    <div class="flex flex-col items-center justify-center w-full max-w-md p-6 sm:p-8 rounded-3xl">
        
        <!-- Status Indicator -->
        <div id="mode-display" class="text-sm font-bold tracking-widest uppercase mb-4 text-gray-900 dark:text-gray-100 transition-colors">
            Focus
        </div>

        <!-- Radial Timer -->
        <div class="relative flex items-center justify-center w-48 h-48 sm:w-56 sm:h-56 mb-8">
            <svg class="absolute inset-0 w-full h-full" style="transform: rotate(-90deg) scaleX(-1);" viewBox="0 0 200 200">
                <!-- Background track -->
                <circle cx="100" cy="100" r="90" stroke="currentColor" stroke-width="8" fill="none" class="text-gray-200 dark:text-gray-700" />
                <!-- Progress wipe -->
                <circle id="progress-circle" cx="100" cy="100" r="90" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="round" class="text-gray-900 dark:text-gray-100" />
            </svg>
            <!-- Time Display -->
            <div id="time-display" class="relative text-5xl sm:text-6xl font-light tabular-nums">
                90:00
            </div>
        </div>

        <!-- Controls -->
        <div class="flex items-center gap-4 mb-8">
            <button id="play-pause-btn" class="flex items-center justify-center w-14 h-14 bg-gray-900 hover:bg-gray-700 dark:bg-gray-100 dark:hover:bg-white text-white dark:text-gray-900 rounded-full shadow-lg transition-transform active:scale-95 focus:outline-none">
                <!-- Play Icon (Default) -->
                <svg id="icon-play" class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <!-- Pause Icon (Hidden initially) -->
                <svg id="icon-pause" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
            </button>

            <button id="stop-btn" class="flex items-center justify-center w-12 h-12 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-full shadow transition-transform active:scale-95 focus:outline-none">
                <!-- Stop Icon -->
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M6 6h12v12H6z" />
                </svg>
            </button>
        </div>

        <!-- Settings -->
        <div class="flex items-center justify-center gap-6 w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-2xl">
            <div class="flex flex-col items-center">
                <label for="work-input" class="text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">Work (min)</label>
                <input id="work-input" type="number" value="90" min="1" max="999" class="w-16 text-center bg-transparent border-b-2 border-gray-300 dark:border-gray-600 focus:border-gray-900 dark:focus:border-gray-100 outline-none text-lg font-semibold transition-colors">
            </div>
            
            <div class="w-px h-8 bg-gray-300 dark:bg-gray-600"></div>

            <div class="flex flex-col items-center">
                <label for="break-input" class="text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">Break (min)</label>
                <input id="break-input" type="number" value="10" min="1" max="999" class="w-16 text-center bg-transparent border-b-2 border-gray-300 dark:border-gray-600 focus:border-gray-500 dark:focus:border-gray-400 outline-none text-lg font-semibold transition-colors">
            </div>
        </div>

    </div>

    <script>
        // DOM Elements
        const timeDisplay = document.getElementById('time-display');
        const modeDisplay = document.getElementById('mode-display');
        const progressCircle = document.getElementById('progress-circle');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const workInput = document.getElementById('work-input');
        const breakInput = document.getElementById('break-input');

        // SVG Circle Setup
        const radius = 90;
        const circumference = 2 * Math.PI * radius;
        progressCircle.style.strokeDasharray = circumference;
        progressCircle.style.strokeDashoffset = 0;

        // State Variables
        let workDuration = 90 * 60; // 90 minutes in seconds
        let breakDuration = 10 * 60; // 10 minutes in seconds
        let timeLeft = workDuration;
        let isRunning = false;
        let isWorkMode = true;
        let timerInterval = null;

        // Formats time from seconds to MM:SS
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Updates the text and the radial wipe progress
        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeLeft);
            
            const totalDuration = isWorkMode ? workDuration : breakDuration;
            
            // Calculate progress offset
            // When timeLeft == totalDuration, offset is 0 (full circle)
            // When timeLeft == 0, offset is circumference (empty circle)
            const progress = (timeLeft / totalDuration);
            const offset = circumference - (progress * circumference);
            
            progressCircle.style.strokeDashoffset = offset;
        }

        // Switches between Work and Break modes
        function switchMode() {
            isWorkMode = !isWorkMode;
            timeLeft = isWorkMode ? workDuration : breakDuration;
            
            if (isWorkMode) {
                modeDisplay.textContent = "Focus";
                modeDisplay.className = "text-sm font-bold tracking-widest uppercase mb-4 text-gray-900 dark:text-gray-100 transition-colors";
                progressCircle.className.baseVal = "text-gray-900 dark:text-gray-100";
                playPauseBtn.className = "flex items-center justify-center w-14 h-14 bg-gray-900 hover:bg-gray-700 dark:bg-gray-100 dark:hover:bg-white text-white dark:text-gray-900 rounded-full shadow-lg transition-transform active:scale-95 focus:outline-none";
            } else {
                modeDisplay.textContent = "Break";
                modeDisplay.className = "text-sm font-bold tracking-widest uppercase mb-4 text-gray-500 dark:text-gray-400 transition-colors";
                progressCircle.className.baseVal = "text-gray-500 dark:text-gray-400";
                playPauseBtn.className = "flex items-center justify-center w-14 h-14 bg-gray-500 hover:bg-gray-600 dark:bg-gray-400 dark:hover:bg-gray-300 text-white dark:text-gray-900 rounded-full shadow-lg transition-transform active:scale-95 focus:outline-none";
            }
            updateDisplay();
        }

        // Timer Tick logic
        function tick() {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                switchMode();
            }
        }

        // Play / Pause Logic
        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                iconPause.classList.add('hidden');
                iconPlay.classList.remove('hidden');
            } else {
                timerInterval = setInterval(tick, 1000);
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
            }
            isRunning = !isRunning;
        }

        // Stop Logic
        function stopTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            iconPause.classList.add('hidden');
            iconPlay.classList.remove('hidden');
            
            // Reset to current mode's full time
            timeLeft = isWorkMode ? workDuration : breakDuration;
            
            // Remove CSS transition temporarily to prevent wiping backward animation on reset
            progressCircle.style.transition = 'none';
            updateDisplay();
            // Restore transition after a tiny delay
            setTimeout(() => {
                progressCircle.style.transition = 'stroke-dashoffset 1s linear, stroke 0.5s ease';
            }, 50);
        }

        // Apply custom durations when inputs change
        function updateDurations() {
            const newWork = parseInt(workInput.value);
            const newBreak = parseInt(breakInput.value);

            if (!isNaN(newWork) && newWork > 0) workDuration = newWork * 60;
            if (!isNaN(newBreak) && newBreak > 0) breakDuration = newBreak * 60;

            // If stopped, instantly reflect the new time based on mode
            if (!isRunning) {
                timeLeft = isWorkMode ? workDuration : breakDuration;
                updateDisplay();
            }
        }

        // Event Listeners
        playPauseBtn.addEventListener('click', toggleTimer);
        stopBtn.addEventListener('click', stopTimer);
        workInput.addEventListener('change', updateDurations);
        breakInput.addEventListener('change', updateDurations);

        // Initialize display
        updateDisplay();

    </script>
</body>
</html>
